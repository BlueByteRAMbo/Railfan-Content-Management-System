version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: railfan_db_prod
    environment:
      POSTGRES_DB: railfan_archive
      POSTGRES_USER: ${POSTGRES_USER:-railfan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - railfan_prod_net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: railfan_backend_prod
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/railfan_archive
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-railfan}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=http://localhost,https://your-domain.com
    restart: unless-stopped
    networks:
      - railfan_prod_net

  frontend:
    image: nginx:alpine
    container_name: railfan_frontend_prod
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - railfan_prod_net

networks:
  railfan_prod_net:
    driver: bridge

volumes:
  postgres_prod_data:
