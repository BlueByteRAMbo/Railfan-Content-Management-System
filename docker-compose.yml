version: "3.9"

services:

  # ─── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: railfan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-railfan_archive}
      POSTGRES_USER: ${POSTGRES_USER:-railfan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-railfan123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-railfan} -d ${POSTGRES_DB:-railfan_archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railfan_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-railfan_archive}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-railfan}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-railfan123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256-bit-key!!}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── React Frontend + Nginx ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railfan_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}

volumes:
  postgres_data:
    driver: local
